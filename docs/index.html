<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BN Predictor" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Bank Nifty Predictor</title>
  <style>
    :root {
      --bg: #0b1220; --panel: #131c2e; --panel2: #0f1728;
      --text: #e7edf7; --muted: #8ea0bd; --line: #22304a;
      --buy: #1fbf75; --sell: #ef4d5a; --neutral: #d8a417;
      --buy-dim: #123528; --sell-dim: #3a1620; --neutral-dim: #33290a;
      --corr-neg: #5aa9ff; --corr-pos: #f2b347;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    }
    header { padding: 16px 16px 8px; }
    header h1 { font-size: 18px; margin: 0; letter-spacing: 0.3px; }
    header .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .head-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .refresh { background: var(--panel); border: 1px solid var(--line); color: var(--text);
      width: 40px; height: 40px; border-radius: 10px; font-size: 20px; line-height: 1; flex: none; }
    .refresh:active { background: var(--panel2); }
    .refresh.spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tabbar { display: flex; gap: 6px; padding: 0 12px; margin-top: 10px; }
    .tabbar button {
      flex: 1; padding: 10px; border: 1px solid var(--line); background: var(--panel2);
      color: var(--muted); border-radius: 10px 10px 0 0; font-size: 14px; font-weight: 600;
    }
    .tabbar button.active { background: var(--panel); color: var(--text); border-bottom-color: var(--panel); }
    main { padding: 12px; max-width: 640px; margin: 0 auto; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .badge {
      display: inline-block; padding: 10px 18px; border-radius: 999px; font-size: 22px; font-weight: 800;
      letter-spacing: 0.5px;
    }
    .badge.buy { background: var(--buy-dim); color: var(--buy); border: 1px solid var(--buy); }
    .badge.sell { background: var(--sell-dim); color: var(--sell); border: 1px solid var(--sell); }
    .badge.neutral { background: var(--neutral-dim); color: var(--neutral); border: 1px solid var(--neutral); }
    .score { font-size: 13px; color: var(--muted); margin-top: 8px; }
    .close { font-size: 15px; margin-top: 6px; }
    .zones { display: flex; gap: 10px; margin-top: 12px; }
    .zone { flex: 1; padding: 10px; border-radius: 10px; background: var(--panel2); border: 1px solid var(--line); }
    .zone .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .zone .val { font-size: 15px; font-weight: 700; margin-top: 4px; }
    .zone.buy .val { color: var(--buy); }
    .zone.sell .val { color: var(--sell); }
    h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin: 0 0 8px; }
    ul.reasons { margin: 0; padding-left: 18px; }
    ul.reasons li { margin: 6px 0; font-size: 14px; line-height: 1.4; }
    table.mini { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.mini td { padding: 6px 4px; border-bottom: 1px solid var(--line); }
    table.mini td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    .pcr-row { display: flex; justify-content: space-between; font-size: 15px; }
    .macro { background: var(--neutral-dim); border-color: var(--neutral); }
    .disclaimer { font-size: 11px; color: var(--muted); text-align: center; padding: 12px 16px 20px; line-height: 1.5; }

    /* score gauge */
    .gauge { margin-top: 12px; }
    .gauge-track { position: relative; height: 12px; border-radius: 6px; overflow: hidden;
      background: linear-gradient(90deg, var(--sell) 0%, var(--sell) 35%, var(--neutral) 35%, var(--neutral) 65%, var(--buy) 65%, var(--buy) 100%); opacity: 0.85; }
    .gauge-mark { position: absolute; top: -3px; width: 3px; height: 18px; background: var(--text); border-radius: 2px; box-shadow: 0 0 0 2px var(--panel); }
    .gauge-scale { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-top: 4px; }
    .gauge-label { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .gauge-label b { color: var(--text); }

    /* price header */
    .price-date { font-size: 12px; color: var(--muted); }
    .price-big { font-size: 30px; font-weight: 800; line-height: 1.1; margin-top: 2px; }
    .chg { display: inline-block; font-size: 13px; font-weight: 700; margin-left: 8px; vertical-align: middle; }
    .chg.up { color: var(--buy); } .chg.down { color: var(--sell); }
    .ohlc { display: flex; gap: 6px; margin-top: 12px; }
    .ohlc .box { flex: 1; background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 8px 4px; text-align: center; }
    .ohlc .box .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .ohlc .box .v { font-size: 14px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }

    /* projected value under zones */
    .zone .proj { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .zone .proj b { color: var(--text); font-variant-numeric: tabular-nums; }
    .internals { display: flex; gap: 10px; margin-top: 12px; font-size: 13px; }
    .internals .chip { flex: 1; background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
    .internals .chip .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .internals .chip .v { font-size: 15px; font-weight: 700; margin-top: 2px; }
    .caption { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.4; }

    /* correlation diverging bars */
    .corr-row { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
    .corr-name { width: 58px; font-size: 12px; font-weight: 600; }
    .corr-track { position: relative; flex: 1; height: 20px; background: var(--panel2); border-radius: 5px; }
    .corr-zero { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--line); }
    .corr-bar { position: absolute; top: 4px; height: 12px; border-radius: 3px; }
    .corr-bar.neg { background: var(--corr-neg); }
    .corr-bar.pos { background: var(--corr-pos); }
    .corr-val { width: 44px; text-align: right; font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .corr-val small { display: block; font-size: 9px; color: var(--muted); font-weight: 400; }
    .corr-axis { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); padding: 0 46px 0 66px; }
    .corr-track.slim { height: 8px; }
    .corr-track.slim .corr-bar { top: 2px; height: 4px; }

    /* day-over-day relationship rows */
    .rel { padding: 10px 0; border-bottom: 1px solid var(--line); }
    .rel:last-of-type { border-bottom: none; }
    .rel-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .rel-name { font-size: 14px; font-weight: 700; }
    .rel-vals { font-size: 13px; color: var(--text); font-variant-numeric: tabular-nums; }
    .rel-vals small { color: var(--muted); font-size: 10px; }
    .rel-vals b { margin-left: 4px; }
    .rel-mid { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .rel-mid .corr-track { flex: 1; }
    .badge-sm { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
    .badge-sm.buy { background: var(--buy-dim); color: var(--buy); border: 1px solid var(--buy); }
    .badge-sm.sell { background: var(--sell-dim); color: var(--sell); border: 1px solid var(--sell); }
    .badge-sm.neutral { background: var(--neutral-dim); color: var(--neutral); border: 1px solid var(--neutral); }
    .rel-note { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* Calendar */
    .cal-summary { display: flex; gap: 8px; margin-bottom: 12px; }
    .cal-summary .stat { flex: 1; text-align: center; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 10px 4px; }
    .cal-summary .stat .n { font-size: 20px; font-weight: 800; }
    .cal-summary .stat .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-nav button { background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 6px 14px; font-size: 16px; }
    .cal-nav .month { font-weight: 700; font-size: 15px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-grid .dow { text-align: center; font-size: 10px; color: var(--muted); padding: 2px 0; }
    .cell { aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; background: var(--panel2); }
    .cell .d { font-size: 12px; font-weight: 600; }
    .cell .p { font-size: 9px; }
    .cell.hit { background: var(--buy-dim); border-color: var(--buy); color: var(--buy); }
    .cell.miss { background: var(--sell-dim); border-color: var(--sell); color: var(--sell); }
    .cell.outlier { background: #1b2333; border-color: #3a475f; color: var(--muted); }
    .cell.empty { opacity: 0.35; }
    .cell.clickable { cursor: pointer; }

    /* popover */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
    .overlay.show { display: flex; }
    .popover { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; max-width: 360px; width: 100%; }
    .popover .close-x { float: right; color: var(--muted); font-size: 20px; background: none; border: none; }
    .row { display: flex; justify-content: space-between; font-size: 14px; margin: 6px 0; }
    .row .k { color: var(--muted); }
    .hidden { display: none; }
    .loading { color: var(--muted); text-align: center; padding: 30px; }
  </style>
</head>
<body>
  <header>
    <div class="head-row">
      <div>
        <h1>Bank Nifty Predictor</h1>
        <div class="sub" id="subhead">Loading…</div>
      </div>
      <button id="refresh-btn" class="refresh" onclick="refreshData()" title="Reload latest data">↻</button>
    </div>
  </header>

  <nav class="tabbar">
    <button id="tab-today" class="active" onclick="showTab('today')">Today</button>
    <button id="tab-calendar" onclick="showTab('calendar')">Calendar</button>
  </nav>

  <main>
    <section id="view-today">
      <div class="loading" id="today-loading">Loading recommendation…</div>
      <div id="today-content" class="hidden"></div>
    </section>

    <section id="view-calendar" class="hidden">
      <div class="loading" id="cal-loading">Loading accuracy history…</div>
      <div id="cal-content" class="hidden"></div>
    </section>
  </main>

  <div class="disclaimer" id="disclaimer">
    Educational/informational only. Not SEBI-registered investment advice.
    Crude &amp; USDINR are futures proxies. Rule-based heuristic, not a trained model.
  </div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closePopover()">
    <div class="popover" id="popover"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
